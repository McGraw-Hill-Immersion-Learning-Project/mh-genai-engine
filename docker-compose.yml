services:
  db:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mhgenai
      POSTGRES_PASSWORD: mhgenai
      POSTGRES_DB: mhgenai
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mhgenai -d mhgenai"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mhgenai:mhgenai@db:5432/mhgenai
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgvector_data:
