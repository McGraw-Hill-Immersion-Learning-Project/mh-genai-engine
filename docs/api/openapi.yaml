openapi: 3.1.0
info:
  title: MH GenAI Engine API
  version: 0.1.0
  description: |
    Versioned API for the MH GenAI Engine. Provides OER-grounded RAG,
    template-driven generation, guardrails, and telemetry.
    Authentication/authorization TBD (e.g. API key header).
    Changelog: see docs/api/CHANGELOG_API.md. Deferred items and open questions: docs/API_DEFERRED_AND_NOTES.md.

servers:
  - url: https://dev.mh-genai-engine.com/v0
    description: Dev environment

paths:
  /generate/lesson-outline:
    post:
      summary: Generate a lesson outline grounded in OER content
      operationId: generateLessonOutline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonOutlineRequest"
      responses:
        "200":
          description: Successful generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonOutlineResponse"
        "400":
          description: Bad request (e.g. validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (auth TBD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /generate/assessment-transform:
    post:
      summary: Transform an MCQ into an open-ended question + rubric
      operationId: transformAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentTransformRequest"
      responses:
        "200":
          description: Successful transformation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentTransformResponse"
        "400":
          description: Bad request (e.g. validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (auth TBD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /retrieve:
    post:
      summary: Retrieve relevant OER chunks with citations
      operationId: retrieveChunks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrieveRequest"
      responses:
        "200":
          description: Retrieved chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveResponse"
        "400":
          description: Bad request (e.g. validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (auth TBD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /templates:
    get:
      summary: List available templates
      description: |
        Returns the Engine's approved template set (e.g. lesson outline, assessment transform).
        Provided by the Engine (Project A); Dashboard uses this to offer workflow options.
      operationId: listTemplates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"
        "401":
          description: Unauthorized (auth TBD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /telemetry/log:
    post:
      summary: Log usage/latency/error events
      operationId: logTelemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryEvent"
      responses:
        "204":
          description: Logged successfully
        "400":
          description: Bad request (e.g. invalid payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (auth TBD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    LessonOutlineRequest:
      type: object
      properties:
        chapter:
          type: string
          description: Chapter or content scope identifier (as produced by the ingestion pipeline)
        learningObjectives:
          type: array
          items: { type: string }
          description: Learning outcome statements to align the outline to
        audience:
          type: string
          description: Target audience (e.g. "undergraduate", "first-year", "majors")
        tone:
          type: string
          description: Desired tone (e.g. "formal", "conversational", "technical")
        timeAllowed:
          type: string
          description: Time budget for the lesson (e.g. "50 min", "1 hour")
        externalResources:
          type: boolean
          default: false
          description: Whether to allow resources outside the selected OER (POC default off)
      required: [chapter]

    LessonOutlineResponse:
      type: object
      properties:
        outline:
          type: string
          description: Main lesson or lecture outline text, aligned to objectives
        keyConcepts:
          type: array
          items: { type: string }
          description: Key concepts to cover (optional)
        misconceptions:
          type: array
          items: { type: string }
          description: Common misconceptions to address (optional)
        checksForUnderstanding:
          type: array
          items: { type: string }
          description: Checks aligned to objectives (optional)
        activityIdeas:
          type: array
          items: { type: string }
          description: Suggested in-class activity ideas, time-boxed (optional)
        slideOutline:
          type: string
          description: Slide-by-slide or speaker-note scaffolding (optional)
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
          description: OER sources used to ground the outline (chapter/section + excerpt)

    AssessmentTransformRequest:
      type: object
      properties:
        question:
          type: string
          description: The MCQ question stem (text of the question)
        options:
          type: array
          items: { type: string }
          description: Answer choices (A, B, C, …) for the original MCQ
        learningObjectives:
          type: array
          items: { type: string }
          description: Optional; for alignment with course objectives
      required: [question]

    AssessmentTransformResponse:
      type: object
      properties:
        openEndedQuestion:
          type: string
          description: The transformed open-ended prompt for students
        rubric:
          type: string
          description: Markdown or text rubric; structured rubricCriteria may be added later
        expectedResponseOutline:
          type: string
          description: Rationale or expected response outline for grading
        misconceptions:
          type: array
          items: { type: string }
          description: Common misconceptions / partial-credit guidance (optional)
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
          description: OER sources used to ground the transformation

    RetrieveRequest:
      type: object
      properties:
        query:
          type: string
          description: Search query (natural language or keywords)
        chapter:
          type: string
          description: Optional; restrict retrieval to this chapter (content scope)
        topK:
          type: integer
          default: 5
          description: Maximum number of chunks to return (semantic similarity)
      required: [query]

    RetrieveResponse:
      type: object
      properties:
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/RetrievedChunk"
          description: Retrieved OER chunks with provenance metadata, ordered by relevance

    RetrievedChunk:
      type: object
      properties:
        text:
          type: string
          description: The chunk content (excerpt from OER)
        chapter:
          type: string
          description: Chapter identifier for citation/provenance
        section:
          type: string
          description: Section identifier within the chapter (if available)
        score:
          type: number
          description: Relevance score (e.g. similarity score from vector search)

    Citation:
      type: object
      properties:
        chapter:
          type: string
          description: Chapter where the cited content appears
        section:
          type: string
          description: Section within the chapter (if available)
        sourceId:
          type: string
          description: Stable identifier for the source (e.g. chunk id from the index)
        excerpt:
          type: string
          description: Short excerpt for tooltip/preview

    Template:
      type: object
      properties:
        id:
          type: string
          description: Stable identifier for this template
        name:
          type: string
          description: Display name (e.g. "Lecture scaffolding")
        description:
          type: string
          description: Short description for the dashboard UI

    TemplateList:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/Template"
          description: List of Engine-approved templates (workflow types) available to callers

    TelemetryEvent:
      type: object
      properties:
        eventType:
          type: string
          description: Type of event (e.g. "generate", "retrieve", "error"); no PII
        latencyMs:
          type: number
          description: Request latency in milliseconds
        timestamp:
          type: string
          format: date-time
          description: When the event occurred (ISO 8601)

    Error:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
