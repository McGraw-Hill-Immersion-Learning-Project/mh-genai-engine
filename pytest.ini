[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    pgvector: tests requiring pgvector Postgres (run with: pytest -m pgvector, requires DATABASE_URL)
filterwarnings =
    # Docling reads deprecated Pydantic fields internally (not configurable from our app).
    ignore:This field is deprecated:DeprecationWarning:docling.pipeline.standard_pdf_pipeline
    ignore::DeprecationWarning:docling.models.stages.ocr.rapid_ocr_model
